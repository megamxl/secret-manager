---
# Step 2: Binary Download Playbook
# Downloads Secret Manager binary from GitHub releases

- name: Install Secret Manager Binary
  hosts: install
  become: yes
  gather_facts: yes
  vars_files:
    - ../group_vars/all.yml

  tasks:
    # Detect binary architecture
    - name: "Handle download path for {{ secret_manager_version }}"
      ansible.builtin.set_fact:
        download_url: "https://github.com/megamxl/secret-manager/releases/download/v{{ secret_manager_version }}/secret-agent"
      when: secret_manager_version != "latest"

    - name: "Handle latest version download"
      ansible.builtin.uri:
        url: "{{ secret_manager_release_url }}"
        return_content: yes
        method: GET
        status_code: 200
      register: release_info
      when: secret_manager_version == "latest"

    - name: "Extract download URL for latest version"
      ansible.builtin.set_fact:
        download_url: "{{ download_url | default(release_info.json.assets | selectattr('name', 'search', 'secret-manager') | map(attribute='browser_download_url') | list | first, true) }}"
      when: secret_manager_version == "latest"

    - name: "Display download URL"
      ansible.builtin.debug:
        msg: "Download URL: {{ download_url }}"

    - name: "Download secret-manager binary"
      ansible.builtin.get_url:
        url: "{{ download_url }}"
        dest: "/tmp/{{ secret_manager_binary_name }}"
        mode: '0755'
        owner: "{{ secret_manager_service_user if secret_manager_service_user != 'root' else 'root' }}"
        validate_certs: yes
      register: download_result
      until: download_result is succeeded
      retries: 3
      delay: 10

    - name: "Move binary to /opt/secret-manager/secret-manager"
      ansible.builtin.copy:
        src: "/tmp/{{ secret_manager_binary_name }}"
        dest: "/opt/secret-manager/secret-manager"
        mode: '0755'
        remote_src: yes
        owner: "secret-manager"
        group: "secret-manager"

    - name: "Verify binary installation"
      ansible.builtin.stat:
        path: "/opt/secret-manager/secret-manager"
      register: binary_stat

    - name: "Display binary installation status"
      ansible.builtin.debug:
        msg: "Binary installed: {{ binary_stat.stat.exists and binary_stat.stat.mode == '0755' }}"

    - name: "Cleanup temporary binary file"
      ansible.builtin.file:
        path: "/tmp/{{ secret_manager_binary_name }}"
        state: absent
      when: binary_stat.stat.exists

    - name: "Display download completion"
      ansible.builtin.debug:
        msg: "✓ Binary download and installation completed"